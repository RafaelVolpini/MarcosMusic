<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <!-- Corpo do calendário -->
  <rect x="2" y="6" width="28" height="24" rx="4" ry="4" fill="#863bff"/>
  <!-- Topo do calendário (header) -->
  <rect x="2" y="6" width="28" height="9" rx="4" ry="4" fill="#6d28d9"/>
  <!-- Fixa cantos retos no bottom do header -->
  <rect x="2" y="11" width="28" height="4" fill="#6d28d9"/>
  <!-- Alças -->
  <rect x="10" y="2" width="3" height="8" rx="1.5" fill="#c4b5fd"/>
  <rect x="19" y="2" width="3" height="8" rx="1.5" fill="#c4b5fd"/>
  <!-- Grade de dias -->
  <circle cx="9"  cy="21" r="1.5" fill="white" opacity="0.9"/>
  <circle cx="16" cy="21" r="1.5" fill="white" opacity="0.9"/>
  <circle cx="23" cy="21" r="1.5" fill="white" opacity="0.9"/>
  <circle cx="9"  cy="27" r="1.5" fill="white" opacity="0.6"/>
  <circle cx="16" cy="27" r="1.5" fill="white" opacity="0.9"/>
  <circle cx="23" cy="27" r="1.5" fill="white" opacity="0.6"/>
</svg>
